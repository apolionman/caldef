{% extends "base.html" %}
{% block title %}Create Account — CalDef{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <a href="{{ url_for('landing') }}" class="auth-logo">◎ CalDef</a>
      <h1>Create your account</h1>
      <p>Start your personalized nutrition journey today.</p>
    </div>

    <div class="auth-card standalone">
      <form action="{{ url_for('register') }}" method="POST" class="auth-form-full">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" name="username" placeholder="johndoe"
                 required minlength="3" maxlength="30" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" name="email" placeholder="john@example.com"
                 required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="At least 6 characters"
                 required minlength="6" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary btn-full" type="submit">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="{{ url_for('landing') }}">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}
